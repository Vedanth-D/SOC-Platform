input {
  file {
    path => "/var/log/suricata/eve.json"
    codec => json
    tags => ["suricata"]
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }

  file {
    path => "/var/log/zeek/current/conn.log"
    codec => plain
    tags => ["zeek"]
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }

  udp {
    port => 5000
    codec => json
    tags => ["wazuh"]
  }
}

filter {
  if "suricata" in [tags] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    if [event_type] == "alert" {
      mutate {
        add_field => { "alert_severity"  => "%{[alert][severity]}" }
        add_field => { "alert_category"  => "%{[alert][category]}" }
        add_field => { "alert_signature" => "%{[alert][signature]}" }
      }
    }
    geoip {
      source => "src_ip"
      target => "src_geo"
    }
  }

  if "zeek" in [tags] {
    if [message] !~ /^#/ {
      dissect {
        mapping => {
          "message" => "%{ts}	%{uid}	%{src_ip}	%{src_port}	%{dest_ip}	%{dest_port}	%{proto}	%{service}	%{duration}	%{orig_bytes}	%{resp_bytes}	%{conn_state}"
        }
      }
    } else {
      drop {}
    }
  }

  if "wazuh" in [tags] {
    mutate {
      add_field => { "wazuh_rule_level" => "%{[rule][level]}" }
      add_field => { "wazuh_rule_desc"  => "%{[rule][description]}" }
    }
  }
}

output {
  if "suricata" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "suricata-alerts-%{+YYYY.MM.dd}"
    }
  }
  if "zeek" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "zeek-conn-%{+YYYY.MM.dd}"
    }
  }
  if "wazuh" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "wazuh-alerts-%{+YYYY.MM.dd}"
    }
  }
  stdout {
    codec => rubydebug
  }
}